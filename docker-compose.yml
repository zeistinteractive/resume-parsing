version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resume-engine-postgres
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
      POSTGRES_DB: resume_engine
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis (Celery broker + result backend) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resume-engine-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-engine-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://resume_user:resume_pass@postgres:5432/resume_engine
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - resume_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  # Same image as backend — just a different entrypoint command.
  # Scale concurrency with CELERY_CONCURRENCY env var (default: 4).
  # 4 = 4 Gemini API calls in parallel — safe for free/paid tier.
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-engine-celery
    command: celery -A celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://resume_user:resume_pass@postgres:5432/resume_engine
      REDIS_URL: redis://redis:6379/0
    volumes:
      # Must share the same uploads volume so it can read the files it parses
      - resume_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React + nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-engine-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  resume_uploads:
    driver: local
